<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection Result</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #E6E6FA, #D8BFD8);
            padding: 50px;
        }

        h1 {
            color: #4B0082;
        }

        img {
            margin-top: 20px;
            border-radius: 12px;
            max-width: 300px;
            box-shadow: 0 8px 20px rgba(147,112,219,0.4);
        }

        .emotion, .confidence, .message {
            margin-top: 20px;
            font-size: 20px;
            color: #4B0082;
            font-weight: bold;
        }

        .bar {
            background: #D8BFD8;
            border-radius: 10px;
            margin: 5px auto;
            width: 80%;
            height: 25px;
            overflow: hidden;
        }

        .fill {
            background: #9370DB;
            height: 100%;
            text-align: right;
            padding-right: 10px;
            color: white;
            line-height: 25px;
            border-radius: 10px;
        }

        a {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            background: #9370DB;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        a:hover {
            background: #8A2BE2;
        }
    </style>
</head>
<body>

    <h1>Emotion Detection Result</h1>

    {% if prediction %}
        <img src="{{ img_path }}" alt="Uploaded Image">

        <div class="emotion">😊 Emotion: {{ prediction }}</div>
        <div class="confidence">📊 Confidence: {{ confidence }}%</div>

        <h3>Top Emotions</h3>
        {% for emotion, value in probs.items() %}
            <div>{{ emotion }} : {{ value }}%</div>
            <div class="bar">
                <div class="fill" style="width: {{ value }}%">{{ value }}%</div>
            </div>
        {% endfor %}

        <div class="message">💬 "{{ message }}"</div>
    {% endif %}

    <a href="{{ url_for('home') }}">Back to Detection Methods</a>

</body>
</html>
